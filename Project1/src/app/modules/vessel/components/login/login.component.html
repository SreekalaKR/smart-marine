<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<div class="login-container">
  <h2>Login</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="Username">Username</label>
      <input type="text" id="Username" name="Username" [(ngModel)]="loginForm.Username" required>
    </div>
    <div class="form-group">
      <label for="Password">Password</label>
      <div class="password-input">
        <input [type]="showPassword ? 'text' : 'password'" id="Password" name="Password" [(ngModel)]="loginForm.Password" required>
     <!-- <input type="Password" id="Password" name="Password" [(ngModel)]="loginForm.Password" required>-->
        <i class="fas fa-eye" (click)="togglePasswordVisibility()"></i>
      </div>
  </div>
    <button type="submit">Login</button>
  </form>
</div>
